<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/loginStyle.css">
    <title>Document</title>
</head>
<body>
    <main>
        <section class="logo">
            <h1>Login your Account</h1>
        </section>

        <section class="loginForm">

            <form action="">
                <label for="email">Email or phone number</label>
                <input type="email" id="email">

                <label for="password">Password</label>
                <input type="password" id="password">
                <p class="forgotLink">Forgot Password?</p>

                <button class="continueBtn">Continue</button>
            </form>

            <p class="continueParagraph">Or continue with</p>

        </section>

        <section class="accounts">
            <div><img src="/assets/icons/google.png" width="25px"><span>Continue with Google</span></div>
            <div><img src="/assets/icons/facebook.png" width="25px" alt=""><span>Continue with Apple</span></div>
            <p>Don't have an account? <a href="signUp.html">Create an account.</a></p>
        </section>
    </main>
</body>
</html>
