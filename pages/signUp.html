<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/signUpStyle.css">
    <title>Document</title>
</head>
<body>
    <main>
        <section class="logo">
            <h1>Login your Account</h1>
        </section>

        <section class="loginForm">

            <form action="">
                <label for="email">Email</label>
                <input type="email" id="email">

                <label for="phoneNumber">Phone number</label>
                <input type="number" id="phoneNumber">

                <label for="password">Password</label>
                <input type="password" id="password">

                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword">

                <div class="terms">
                    <input type="checkbox" name="tandc" id="tandc">
                    <label for="tandc">I agree to the <a href="">Terms & conditions</a> and <a href="">Privacy Policy</a></label>
                </div>

                <button class="continueBtn">Continue</button>
            </form>

            <p class="continueParagraph">Or continue with</p>

        </section>

        <section class="accounts">
            <div><img src="/assets/icons/google.png" width="25px"><span>Continue with Google</span></div>
            <div><img src="/assets/icons/facebook.png" width="25px" alt=""><span>Continue with Apple</span></div>
            <p>Already have an account? <a href="login.html">Sign In</a></p>
        </section>
    </main>
</body>
</html>
